name: Release

on:
  issue_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write

jobs:
  release:
    if: |
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/release') &&
      (
        github.event.comment.author_association == 'OWNER' ||
        github.event.comment.author_association == 'MEMBER' ||
        github.event.comment.author_association == 'COLLABORATOR'
      )
    runs-on: ubuntu-latest
    concurrency:
      group: release-process
      cancel-in-progress: false
    steps:
      - name: Check out master branch
        uses: actions/checkout@v4
        with:
          ref: 'master'
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name 'github-actions[bot]'
          git config --global user.email 'github-actions[bot]@users.noreply.github.com'

      - name: Validate release command
        run: |
          set -euo pipefail

          COMMENT_BODY=${{ toJSON(github.event.comment.body) }}
          if [[ "$COMMENT_BODY" != "/release" ]]; then
            echo "::error::Only the plain /release command is supported. Release strategy flags or other arguments are not allowed."
            exit 1
          fi

      - name: Get PR branch and validate version
        id: get_pr_branch
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
        run: |
          set -euo pipefail

          BRANCH=$(gh pr view "$PR_NUMBER" --json headRefName --jq .headRefName)
          echo "branch=$BRANCH" >> "$GITHUB_OUTPUT"

          if [[ ! "$BRANCH" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::Branch name '$BRANCH' does not match required pattern 'vX.Y.Z' (e.g., v0.5.0). Only version branches can be released."
            exit 1
          fi

          echo "version=$BRANCH" >> "$GITHUB_OUTPUT"

      - name: Preflight, prepare release commit, and tag
        id: release_commit
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          BRANCH_NAME: ${{ steps.get_pr_branch.outputs.branch }}
          NEW_VERSION: ${{ steps.get_pr_branch.outputs.version }}
        run: |
          set -euo pipefail

          RELEASE_NOTES_PATH="$RUNNER_TEMP/release-notes.md"
          echo "new_version=$NEW_VERSION" >> "$GITHUB_OUTPUT"
          echo "release_notes_path=$RELEASE_NOTES_PATH" >> "$GITHUB_OUTPUT"

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree must be clean before release changes."
            git status --short
            exit 1
          fi

          if git ls-remote --exit-code --tags origin "refs/tags/$NEW_VERSION" >/dev/null 2>&1; then
            echo "::error::Remote tag '$NEW_VERSION' already exists."
            exit 1
          fi

          set +e
          GH_RELEASE_VIEW_OUTPUT=$(gh release view "$NEW_VERSION" 2>&1 >/dev/null)
          GH_RELEASE_VIEW_STATUS=$?
          set -e
          if [[ "$GH_RELEASE_VIEW_STATUS" -eq 0 ]]; then
            echo "::error::GitHub Release '$NEW_VERSION' already exists."
            exit 1
          fi
          if ! grep -Eiq '(release not found|not found|HTTP 404)' <<< "$GH_RELEASE_VIEW_OUTPUT"; then
            echo "::error::Unable to verify whether GitHub Release '$NEW_VERSION' already exists."
            echo "$GH_RELEASE_VIEW_OUTPUT"
            exit 1
          fi

          if git rev-parse -q --verify "refs/tags/$NEW_VERSION" >/dev/null; then
            echo "::error::Local tag '$NEW_VERSION' already exists."
            exit 1
          fi

          git fetch origin "master:refs/remotes/origin/master" "$BRANCH_NAME:refs/remotes/origin/$BRANCH_NAME"
          git checkout -B "$BRANCH_NAME" "origin/$BRANCH_NAME"

          CHANGELOG_VERSION=${NEW_VERSION#v}
          python3 - "$CHANGELOG_VERSION" "$RELEASE_NOTES_PATH" <<'PY'
          import re
          import sys
          from pathlib import Path

          version = sys.argv[1]
          output = Path(sys.argv[2])
          changelog = Path("CHANGELOG.md")

          if not changelog.exists():
              print("::error::CHANGELOG.md is required for releases.")
              sys.exit(1)

          lines = changelog.read_text(encoding="utf-8").splitlines(keepends=True)
          start_pattern = re.compile(rf"^## \[{re.escape(version)}\] - .+")
          next_pattern = re.compile(r"^## \[[0-9]+\.[0-9]+\.[0-9]+\] - .+")

          start = None
          for index, line in enumerate(lines):
              if start_pattern.match(line):
                  start = index
                  break

          if start is None:
              print(f"::error::CHANGELOG.md is missing a release heading for {version} matching '## [{version}] - ...'.")
              sys.exit(1)

          end = len(lines)
          for index in range(start + 1, len(lines)):
              if next_pattern.match(lines[index]):
                  end = index
                  break

          section = "".join(lines[start:end])
          body = "".join(lines[start + 1:end]).strip()
          if not body:
              print(f"::error::CHANGELOG.md section for {version} must contain release notes beyond the heading.")
              sys.exit(1)

          output.write_text(section, encoding="utf-8")
          PY

          if [[ ! -s "$RELEASE_NOTES_PATH" ]]; then
            echo "::error::Release notes file is empty after extracting CHANGELOG.md notes."
            exit 1
          fi

          git rebase origin/master || {
            echo "::error::Release branch '$BRANCH_NAME' cannot rebase cleanly onto origin/master."
            exit 1
          }

          git checkout master
          git reset --hard origin/master
          git merge --ff-only "$BRANCH_NAME" || {
            echo "::error::master cannot fast-forward to rebased release branch '$BRANCH_NAME'."
            exit 1
          }

          printf '%s\n' "$NEW_VERSION" > version
          git add version
          if ! git diff --cached --quiet; then
            git commit -m "chore(release): $NEW_VERSION"
          fi

          git tag "$NEW_VERSION"

          if [[ "$(cat version)" != "$NEW_VERSION" ]]; then
            echo "::error::version file does not exactly equal '$NEW_VERSION'."
            exit 1
          fi

          if ! git rev-parse -q --verify "refs/tags/$NEW_VERSION" >/dev/null; then
            echo "::error::Local tag '$NEW_VERSION' was not created."
            exit 1
          fi

          TAG_TARGET=$(git rev-parse "refs/tags/$NEW_VERSION")
          HEAD_TARGET=$(git rev-parse HEAD)
          if [[ "$TAG_TARGET" != "$HEAD_TARGET" ]]; then
            echo "::error::Local tag '$NEW_VERSION' does not point to HEAD."
            exit 1
          fi

          if [[ -n "$(git status --porcelain)" ]]; then
            echo "::error::Working tree must be clean after release commit and tag."
            git status --short
            exit 1
          fi

      - name: Push master and release tag
        run: |
          set -euo pipefail

          git push origin master
          git push origin "refs/tags/${{ steps.release_commit.outputs.new_version }}:refs/tags/${{ steps.release_commit.outputs.new_version }}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.release_commit.outputs.new_version }}
          body_path: ${{ steps.release_commit.outputs.release_notes_path }}

      - name: Close Pull Request
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail

          gh pr close ${{ github.event.issue.number }} --comment "Released in ${{ steps.release_commit.outputs.new_version }}"
